{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Spice Garden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand text-warning" href="/">Spice Garden</a>
        <form method="GET" class="menu-search-form" action="{% url 'menu' %}">
            <input type="text" name="search" placeholder="search..." value="{{ search|default:'' }}">
            <button type="submit">Search</button>
        </form>
        <div>
            <a class="text-white me-3" href="/">Home</a>
            <a class="text-white me-3" href="/menu/">Menu</a> 
            <a class="text-white me-3" href="/contact/">Contact</a>
            <a class="text-white" href="/reservation/">Reservation</a>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
