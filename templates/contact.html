{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <h2 class="text-center mb-4">Contact Us</h2>

    {% if success %}
    <div class="alert alert-success text-center">Message sent succesfully

    </div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" class="form-control mb-3" placeholder="Your Name" required>
        <input type="email" name="email" class="form-control mb-3" placeholder="Your Email" required>
        <textarea name="message" class="form-control mb-3" placeholder="Your Message"></textarea>

        <button class="btn btn-warning">Send</button>
    </form>

</div>
{% endblock %}

</body>
</html>
